<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxAuto AI Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07070a;
  --card:#0f1118;
  --gold:#d4af37;
  --muted:#9aa0a6;
  --line:#1c1f2a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#15152a,#07070a);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:30px 20px 10px;
}

header h1{
  margin:0;
  font-size:42px;
}

header p{
  color:var(--muted);
}

/* SELECT */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

select{
  width:32%;
  padding:12px;
  margin:5px;
  border-radius:12px;
  background:var(--card);
  color:white;
  border:1px solid var(--line);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
  margin-top:25px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f111a,#0a0b10);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:var(--gold);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:15px;
}

.brand{
  font-size:12px;
  color:var(--muted);
}

.name{
  font-size:18px;
  font-weight:700;
}

.price{
  color:var(--gold);
  margin-top:5px;
  font-weight:600;
}

/* BAR */
.bar{
  height:6px;
  background:#1a1d2a;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d4af37,#ffcc55);
  transition:0.5s;
}

/* AI BOX */
.ai{
  margin:15px 0;
  padding:14px;
  border-radius:14px;
  background:rgba(212,175,55,0.06);
  border:1px solid rgba(212,175,55,0.2);
  color:var(--gold);
  font-weight:600;
}
</style>
</head>

<body>

<header>
  <h1>LuxAuto AI Compare</h1>
  <p>Luxury Car Intelligence Dashboard</p>
</header>

<div class="container">

<select id="c1" onchange="update()"></select>
<select id="c2" onchange="update()"></select>
<select id="c3" onchange="update()"></select>

<div id="ai" class="ai"></div>

<div class="grid" id="grid"></div>

</div>

<script>

const cars=[
{
 brand:"Rolls Royce",
 name:"Phantom VIII",
 price:460000,
 hp:563,
 speed:155,
 luxury:10,
 img:"https://images.unsplash.com/photo-1614200187524-dc4b892acf16"
},
{
 brand:"Bentley",
 name:"Flying Spur",
 price:220000,
 hp:626,
 speed:207,
 luxury:9,
 img:"https://images.unsplash.com/photo-1617654112368-307921291f42"
},
{
 brand:"Mercedes",
 name:"Maybach S680",
 price:200000,
 hp:621,
 speed:155,
 luxury:10,
 img:"https://images.unsplash.com/photo-1617814065893-0a0f4c8ad5ac"
},
{
 brand:"Lamborghini",
 name:"Urus",
 price:240000,
 hp:666,
 speed:190,
 luxury:8,
 img:"https://images.unsplash.com/photo-1544829099-b9a0c07fad1a"
},
{
 brand:"Ferrari",
 name:"SF90 Stradale",
 price:520000,
 hp:986,
 speed:211,
 luxury:8,
 img:"https://images.unsplash.com/photo-1542362567-b07e54358753"
},
{
 brand:"Porsche",
 name:"911 Turbo S",
 price:230000,
 hp:640,
 speed:205,
 luxury:8,
 img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
}
];

// dropdown
["c1","c2","c3"].forEach(id=>{
 let sel=document.getElementById(id);
 cars.forEach(c=>{
  let o=document.createElement("option");
  o.value=c.name;
  o.innerText=c.brand+" "+c.name;
  sel.appendChild(o);
 });
});

function get(n){
 return cars.find(c=>c.name===n);
}

function score(c){
 return c.hp*0.35 + c.speed*0.25 + c.luxury*0.25 + (1000000/c.price)*0.15;
}

function update(){

 let selected=[get(c1.value),get(c2.value),get(c3.value)].filter(Boolean);

 if(!selected.length) return;

 let best=[...selected].sort((a,b)=>score(b)-score(a))[0];

 document.getElementById("ai").innerHTML=
 `🧠 AI Recommendation: <b>${best.brand} ${best.name}</b> is the best choice`;

 let html="";

 selected.forEach(c=>{
  html+=`
  <div class="card">
    <img src="${c.img}" />
    <div class="content">

      <div class="brand">${c.brand}</div>
      <div class="name">${c.name}</div>
      <div class="price">$${c.price.toLocaleString()}</div>

      <div>Horsepower: ${c.hp}</div>
      <div class="bar"><div class="fill" style="width:${c.hp/10}%"></div></div>

      <div>Top Speed: ${c.speed}</div>
      <div class="bar"><div class="fill" style="width:${c.speed}%"></div></div>

      <div>Luxury Level: ${c.luxury}/10</div>
      <div class="bar"><div class="fill" style="width:${c.luxury*10}%"></div></div>

    </div>
  </div>
  `;
 });

 document.getElementById("grid").innerHTML=html;
}

</script>

</body>
</html>
