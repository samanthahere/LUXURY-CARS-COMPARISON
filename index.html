<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxAuto Compare Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07070a;
  --card:#0f0f14;
  --gold:#d4af37;
  --text:#ffffff;
  --muted:#a0a0a0;
  --line:#1c1c22;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#151521,#07070a);
  color:var(--text);
}

/* HEADER */
header{
  text-align:center;
  padding:30px 20px 10px;
}

header h1{
  margin:0;
  font-size:42px;
  letter-spacing:-1px;
}

header p{
  color:var(--muted);
  margin-top:8px;
}

/* CONTROL PANEL */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.select-grid{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select{
  flex:1;
  min-width:180px;
  padding:12px;
  border-radius:12px;
  background:var(--card);
  color:white;
  border:1px solid var(--line);
  outline:none;
  transition:0.3s;
}

select:hover{
  border-color:var(--gold);
}

/* AI BOX */
.ai{
  margin-top:15px;
  padding:14px;
  border-radius:14px;
  background:rgba(212,175,55,0.06);
  border:1px solid rgba(212,175,55,0.2);
  color:var(--gold);
  font-weight:600;
}

/* GRID */
.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f16,#0a0a0f);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--gold);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.brand{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.name{
  font-size:18px;
  font-weight:700;
}

.price{
  color:var(--gold);
  margin-top:6px;
  font-weight:600;
}

/* STATS */
.stat{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}

.bar{
  height:6px;
  background:#1a1a22;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d4af37,#ffcc55);
  transition:0.5s;
}

/* FLOAT GLOW */
.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:var(--gold);
  filter:blur(200px);
  opacity:0.06;
  top:-150px;
  left:-150px;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>
  <h1>Luxury Auto Compare Pro</h1>
  <p>Compare elite cars like a premium buyer dashboard</p>
</header>

<div class="container">

<div class="select-grid">
  <select id="c1" onchange="update()"></select>
  <select id="c2" onchange="update()"></select>
  <select id="c3" onchange="update()"></select>
</div>

<div id="ai" class="ai"></div>

<div class="grid" id="grid"></div>

</div>

<script>
const cars=[
{
 brand:"Rolls Royce",
 name:"Phantom VIII",
 price:460000,
 hp:563,
 speed:155,
 luxury:10,
 efficiency:6
},
{
 brand:"Bentley",
 name:"Flying Spur",
 price:220000,
 hp:626,
 speed:207,
 luxury:9,
 efficiency:7
},
{
 brand:"Mercedes-Benz",
 name:"Maybach S680",
 price:200000,
 hp:621,
 speed:155,
 luxury:10,
 efficiency:7
},
{
 brand:"Lamborghini",
 name:"Urus Performante",
 price:240000,
 hp:666,
 speed:190,
 luxury:8,
 efficiency:6
},
{
 brand:"Ferrari",
 name:"SF90 Stradale",
 price:520000,
 hp:986,
 speed:211,
 luxury:8,
 efficiency:6
},
{
 brand:"Porsche",
 name:"911 Turbo S",
 price:230000,
 hp:640,
 speed:205,
 luxury:8,
 efficiency:8
}
];

// fill selects
["c1","c2","c3"].forEach(id=>{
 let sel=document.getElementById(id);
 cars.forEach(c=>{
  let opt=document.createElement("option");
  opt.value=c.name;
  opt.innerText=c.brand+" "+c.name;
  sel.appendChild(opt);
 });
});

function get(name){
 return cars.find(c=>c.name===name);
}

function score(c){
 return (c.hp*0.35)+(c.speed*0.25)+(c.luxury*0.25)+(c.efficiency*0.15);
}

function update(){

 let selected=[get(c1.value),get(c2.value),get(c3.value)].filter(Boolean);

 if(!selected.length) return;

 let best=[...selected].sort((a,b)=>score(b)-score(a))[0];

 document.getElementById("ai").innerHTML=
 `🧠 AI Recommendation: <b>${best.brand} ${best.name}</b> is the best overall pick`;

 let html="";

 selected.forEach(c=>{
  let s=score(c);

  html+=`
  <div class="card">
    <div class="brand">${c.brand}</div>
    <div class="name">${c.name}</div>
    <div class="price">$${c.price.toLocaleString()}</div>

    <div class="stat">Horsepower: ${c.hp}</div>
    <div class="bar"><div class="fill" style="width:${c.hp/10}%"></div></div>

    <div class="stat">Top Speed: ${c.speed} mph</div>
    <div class="bar"><div class="fill" style="width:${c.speed}%"></div></div>

    <div class="stat">Luxury Rating</div>
    <div class="bar"><div class="fill" style="width:${c.luxury*10}%"></div></div>

    <div class="stat">Efficiency</div>
    <div class="bar"><div class="fill" style="width:${c.efficiency*10}%"></div></div>

    <div class="stat"><b>Score:</b> ${s.toFixed(1)}</div>
  </div>
  `;
 });

 document.getElementById("grid").innerHTML=html;
}
</script>

</body>
</html>
