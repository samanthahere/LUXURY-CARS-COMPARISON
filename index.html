<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Car 3D Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#141420,#050507);
  color:white;
}

header{
  text-align:center;
  padding:20px;
}

header h1{
  margin:0;
  font-size:40px;
}

.container{
  padding:20px;
}

select{
  width:32%;
  padding:12px;
  margin:5px;
  border-radius:10px;
  background:#111;
  color:white;
  border:1px solid #333;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  margin-top:20px;
}

/* CARD */
.card{
  width:30%;
  min-width:280px;
  background:rgba(255,255,255,0.04);
  border:1px solid #222;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#FFD700;
}

/* FAKE 3D VIEW */
.viewer{
  width:100%;
  height:260px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:grab;
}

.viewer img{
  width:100%;
  user-select:none;
  pointer-events:none;
  transform:scale(1.1);
}

.price{
  color:#FFD700;
}
</style>
</head>

<body>

<header>
  <h1>Luxury Fake 3D Car Viewer</h1>
  <p>Drag to rotate like showroom</p>
</header>

<div class="container">

<select id="c1" onchange="update()"></select>
<select id="c2" onchange="update()"></select>
<select id="c3" onchange="update()"></select>

<div class="row" id="view"></div>

</div>

<script>
/*
We simulate 360° using multiple images.
For demo: we reuse same image but "fake rotation effect".
*/

const cars = [
{
 name:"Porsche 911",
 price:230000,
 img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
},
{
 name:"Ferrari SF90",
 price:520000,
 img:"https://images.unsplash.com/photo-1542362567-b07e54358753"
},
{
 name:"Lamborghini Urus",
 price:240000,
 img:"https://images.unsplash.com/photo-1544829099-b9a0c07fad1a"
},
{
 name:"Bentley",
 price:220000,
 img:"https://images.unsplash.com/photo-1619767886558-efdc259cde1f"
},
{
 name:"Rolls Royce",
 price:460000,
 img:"https://images.unsplash.com/photo-1614200187524-dc4b892acf16"
}
];

// fill dropdown
["c1","c2","c3"].forEach(id=>{
 let s=document.getElementById(id);
 cars.forEach(c=>{
  let o=document.createElement("option");
  o.value=c.name;
  o.innerText=c.name;
  s.appendChild(o);
 });
});

function get(name){
 return cars.find(c=>c.name===name);
}

function createViewer(img){
 let div=document.createElement("div");
 div.className="viewer";

 let image=document.createElement("img");
 image.src=img;

 let rotate=0;

 div.addEventListener("mousemove",(e)=>{
  rotate = (e.offsetX / div.offsetWidth) * 40 - 20;
  image.style.transform = `scale(1.2) rotateY(${rotate}deg)`;
 });

 div.addEventListener("mouseleave",()=>{
  image.style.transform="scale(1.1) rotateY(0deg)";
 });

 div.appendChild(image);
 return div;
}

function update(){

 let selected=[get(c1.value),get(c2.value),get(c3.value)]
 .filter(Boolean);

 let html="";

 selected.forEach(c=>{
  let card=document.createElement("div");
  card.className="card";

  let viewer=createViewer(c.img);

  card.innerHTML=`
    <h3 style="padding:10px">${c.name}</h3>
    <div style="padding:10px;color:#FFD700">$${c.price.toLocaleString()}</div>
  `;

  card.insertBefore(viewer, card.children[0]);

  html+=card.outerHTML;
 });

 document.getElementById("view").innerHTML=html;
}
</script>

</body>
</html>
