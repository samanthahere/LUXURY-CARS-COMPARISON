<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxAuto Pro Max</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07080c;
  --panel:#0e1016;
  --card:#121520;
  --gold:#d4af37;
  --muted:#9aa0a6;
  --line:#1d2230;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#15152c,#07080c);
  color:white;
}

/* LAYOUT */
.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:var(--panel);
  border-right:1px solid var(--line);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:800;
  color:var(--gold);
  margin-bottom:25px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav button{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  color:var(--muted);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.nav button:hover{
  border-color:var(--gold);
  color:white;
  transform:translateX(4px);
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* TOP BAR */
.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input, select{
  padding:12px;
  border-radius:12px;
  background:var(--card);
  border:1px solid var(--line);
  color:white;
  outline:none;
}

/* AI BOX */
.ai{
  margin:15px 0;
  padding:14px;
  border-radius:14px;
  background:rgba(212,175,55,0.06);
  border:1px solid rgba(212,175,55,0.2);
  color:var(--gold);
  font-weight:600;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111522,#0b0d14);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:var(--gold);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.content{
  padding:14px;
}

.brand{
  font-size:12px;
  color:var(--muted);
}

.name{
  font-size:18px;
  font-weight:700;
}

.price{
  color:var(--gold);
  margin-top:6px;
}

/* BTN */
.btn{
  margin-top:10px;
  padding:8px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--gold);
  color:black;
  font-weight:600;
}

/* COMPARE */
.compare{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  border:1px solid var(--gold);
  padding:12px;
  border-radius:14px;
  width:260px;
}

.small{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">LuxAuto Pro Max</div>

  <div class="nav">
    <button onclick="reset()">Dashboard</button>
    <button onclick="showFav()">Favorites</button>
    <button onclick="clearFav()">Clear Favorites</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <input id="search" placeholder="Search luxury cars..." oninput="render()">
  <select id="brandFilter" onchange="render()">
    <option value="">All Brands</option>
  </select>
  <select id="compare1" onchange="updateCompare()"></select>
  <select id="compare2" onchange="updateCompare()"></select>
  <select id="compare3" onchange="updateCompare()"></select>
</div>

<div id="ai" class="ai"></div>

<div class="grid" id="grid"></div>

</div>

</div>

<div class="compare" id="compareBox">
<b>Compare AI</b>
<div class="small" id="compareText">Select cars</div>
</div>

<script>

const cars=[
{
brand:"Rolls Royce",
name:"Phantom VIII",
price:460000,
hp:563,
speed:155,
img:"https://images.unsplash.com/photo-1614200187524-dc4b892acf16"
},
{
brand:"Bentley",
name:"Flying Spur",
price:220000,
hp:626,
speed:207,
img:"https://images.unsplash.com/photo-1617654112368-307921291f42"
},
{
brand:"Mercedes",
name:"Maybach S680",
price:200000,
hp:621,
speed:155,
img:"https://images.unsplash.com/photo-1617814065893-0a0f4c8ad5ac"
},
{
brand:"Lamborghini",
name:"Urus",
price:240000,
hp:666,
speed:190,
img:"https://images.unsplash.com/photo-1544829099-b9a0c07fad1a"
},
{
brand:"Ferrari",
name:"SF90",
price:520000,
hp:986,
speed:211,
img:"https://images.unsplash.com/photo-1542362567-b07e54358753"
},
{
brand:"Porsche",
name:"911 Turbo S",
price:230000,
hp:640,
speed:205,
img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
}
];

let favorites=JSON.parse(localStorage.getItem("fav"))||[];

const grid=document.getElementById("grid");

function initFilters(){
 let brands=[...new Set(cars.map(c=>c.brand))];
 let sel=document.getElementById("brandFilter");
 brands.forEach(b=>{
  let o=document.createElement("option");
  o.value=b;
  o.innerText=b;
  sel.appendChild(o);
 });

 ["compare1","compare2","compare3"].forEach(id=>{
  let s=document.getElementById(id);
  cars.forEach(c=>{
   let o=document.createElement("option");
   o.value=c.name;
   o.innerText=c.brand+" "+c.name;
   s.appendChild(o);
  });
 });
}

function score(c){
 return c.hp*0.35 + c.speed*0.25 + (1000000/c.price)*0.4;
}

function render(){
 let q=document.getElementById("search").value.toLowerCase();
 let b=document.getElementById("brandFilter").value;

 let filtered=cars.filter(c=>{
  return (!q || c.name.toLowerCase().includes(q)) &&
         (!b || c.brand===b);
 });

 grid.innerHTML="";

 filtered.forEach(c=>{
  grid.innerHTML+=`
  <div class="card">
    <img src="${c.img}">
    <div class="content">
      <div class="brand">${c.brand}</div>
      <div class="name">${c.name}</div>
      <div class="price">$${c.price.toLocaleString()}</div>
      <button class="btn" onclick="fav('${c.name}')">❤️ Save</button>
    </div>
  </div>`;
 });
}

function fav(name){
 let car=cars.find(c=>c.name===name);
 if(!favorites.find(f=>f.name===name)){
  favorites.push(car);
 }
 localStorage.setItem("fav",JSON.stringify(favorites));
 alert("Saved!");
}

function showFav(){
 grid.innerHTML="";
 favorites.forEach(c=>{
  grid.innerHTML+=`
  <div class="card">
    <img src="${c.img}">
    <div class="content">
      <div class="brand">${c.brand}</div>
      <div class="name">${c.name}</div>
      <div class="price">$${c.price.toLocaleString()}</div>
    </div>
  </div>`;
 });
}

function clearFav(){
 favorites=[];
 localStorage.removeItem("fav");
 render();
}

function updateCompare(){
 let a=document.getElementById("compare1").value;
 let b=document.getElementById("compare2").value;
 let c=document.getElementById("compare3").value;

 let list=[a,b,c].map(n=>cars.find(x=>x.name===n)).filter(Boolean);

 if(!list.length) return;

 let best=[...list].sort((x,y)=>score(y)-score(x))[0];

 document.getElementById("compareText").innerHTML=
 "Best: "+best.brand+" "+best.name;
}

initFilters();
render();

</script>

</body>
</html>
