<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxCompare 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#141420,#050507);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
}
header h1{
  margin:0;
  font-size:40px;
}
header p{
  opacity:0.6;
}

/* SELECT */
.container{
  padding:20px;
}

select{
  width:32%;
  padding:12px;
  margin:5px;
  border-radius:10px;
  background:#111;
  color:white;
  border:1px solid #333;
}

/* BEST */
.best{
  text-align:center;
  margin:15px 0;
  color:#FFD700;
  font-weight:600;
}

/* GRID */
.row{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

/* CARD */
.card{
  width:30%;
  min-width:280px;
  background:rgba(255,255,255,0.04);
  border:1px solid #222;
  border-radius:16px;
  padding:10px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:#FFD700;
}

/* 3D VIEW */
model-viewer{
  width:100%;
  height:280px;
  background:radial-gradient(circle,#222,#000);
  border-radius:12px;
}

/* TEXT */
.price{
  color:#FFD700;
}

.bar{
  height:6px;
  background:#222;
  border-radius:10px;
  margin:6px 0;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#FFD700,#ffb300);
  width:0%;
}
</style>
</head>

<body>

<header>
  <h1>Luxury 3D Car Compare</h1>
  <p>Rotate • Compare • Decide</p>
</header>

<div class="container">

<select id="c1" onchange="update()"></select>
<select id="c2" onchange="update()"></select>
<select id="c3" onchange="update()"></select>

<div id="best" class="best"></div>

<div class="row" id="view"></div>

</div>

<script>
const cars=[
{
 name:"Rolls Royce Phantom",
 price:460000,
 hp:563,
 speed:155,
 model:"https://modelviewer.dev/shared-assets/models/Car.glb"
},
{
 name:"Ferrari SF90",
 price:520000,
 hp:986,
 speed:211,
 model:"https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
},
{
 name:"Lamborghini Urus",
 price:240000,
 hp:641,
 speed:190,
 model:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"
},
{
 name:"Bentley Flying Spur",
 price:220000,
 hp:626,
 speed:207,
 model:"https://modelviewer.dev/shared-assets/models/Car.glb"
},
{
 name:"Mercedes Maybach",
 price:200000,
 hp:496,
 speed:155,
 model:"https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
}
];

// fill dropdowns
["c1","c2","c3"].forEach(id=>{
 let sel=document.getElementById(id);
 cars.forEach(c=>{
  let opt=document.createElement("option");
  opt.value=c.name;
  opt.innerText=c.name;
  sel.appendChild(opt);
 });
});

function get(name){
 return cars.find(c=>c.name===name);
}

function score(c){
 return c.hp*0.4 + c.speed*0.4 + (1000000/c.price)*0.2;
}

function update(){

 let selected=[get(c1.value),get(c2.value),get(c3.value)]
 .filter(Boolean);

 if(!selected.length){
  document.getElementById("view").innerHTML="";
  document.getElementById("best").innerHTML="";
  return;
 }

 let best=[...selected].sort((a,b)=>score(b)-score(a))[0];

 document.getElementById("best").innerHTML=
 `🧠 AI Recommendation: <b>${best.name}</b>`;

 let html="";

 selected.forEach(c=>{
  html+=`
   <div class="card">

    <model-viewer
      src="${c.model}"
      auto-rotate
      camera-controls
      shadow-intensity="1">
    </model-viewer>

    <h3>${c.name}</h3>
    <div class="price">$${c.price.toLocaleString()}</div>

    <p>Horsepower: ${c.hp}</p>
    <div class="bar"><div class="fill" style="width:${c.hp/10}%"></div></div>

    <p>Speed: ${c.speed}</p>
    <div class="bar"><div class="fill" style="width:${c.speed}%"></div></div>

   </div>
  `;
 });

 document.getElementById("view").innerHTML=html;
}
</script>

</body>
</html>
