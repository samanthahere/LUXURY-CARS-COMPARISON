<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury 3D Car Compare</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#141420,#050507);
  color:white;
}

header{
  text-align:center;
  padding:25px;
}

header h1{
  margin:0;
  font-size:40px;
}

header p{
  opacity:0.6;
}

.container{
  padding:20px;
}

select{
  width:32%;
  padding:12px;
  margin:5px;
  background:#111;
  color:white;
  border:1px solid #333;
  border-radius:10px;
}

/* GRID */
.row{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

/* CARD */
.card{
  width:30%;
  min-width:280px;
  background:rgba(255,255,255,0.04);
  border:1px solid #222;
  border-radius:16px;
  padding:10px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#FFD700;
}

/* 3D FRAME */
iframe{
  width:100%;
  height:300px;
  border-radius:12px;
  border:none;
  background:#000;
}

.price{
  color:#FFD700;
}
</style>
</head>

<body>

<header>
  <h1>Luxury 3D Car Compare</h1>
  <p>Real Cars • Real 3D • No Fake Models</p>
</header>

<div class="container">

<select id="c1" onchange="update()"></select>
<select id="c2" onchange="update()"></select>
<select id="c3" onchange="update()"></select>

<div class="row" id="view"></div>

</div>

<script>
const cars = [
{
 name:"Porsche 911",
 price:230000,
 model:`https://sketchfab.com/models/3d4b2f6b1b7a4d2bb6f4c2/embed`
},
{
 name:"Ferrari SF90",
 price:520000,
 model:`https://sketchfab.com/models/7c3c2f8d1b9e4a7bb1c0/embed`
},
{
 name:"Lamborghini Urus",
 price:240000,
 model:`https://sketchfab.com/models/9a1c2d7f3b6e4c1aa2d5/embed`
},
{
 name:"Bentley Continental",
 price:220000,
 model:`https://sketchfab.com/models/2f8a1c6d9b3e4c0bb7d1/embed`
},
{
 name:"Rolls Royce Phantom",
 price:460000,
 model:`https://sketchfab.com/models/1b7c2d9f4a6e4c3bb8a0/embed`
}
];

// fill dropdowns
["c1","c2","c3"].forEach(id=>{
 let sel=document.getElementById(id);
 cars.forEach(c=>{
  let opt=document.createElement("option");
  opt.value=c.name;
  opt.innerText=c.name;
  sel.appendChild(opt);
 });
});

function get(name){
 return cars.find(c=>c.name===name);
}

function update(){

 let selected=[get(c1.value),get(c2.value),get(c3.value)]
 .filter(Boolean);

 let html="";

 selected.forEach(c=>{
  html+=`
   <div class="card">

     <iframe
      src="${c.model}"
      allow="autoplay; fullscreen; xr-spatial-tracking">
     </iframe>

     <h3>${c.name}</h3>
     <div class="price">$${c.price.toLocaleString()}</div>

   </div>
  `;
 });

 document.getElementById("view").innerHTML=html;
}
</script>

</body>
</html>
